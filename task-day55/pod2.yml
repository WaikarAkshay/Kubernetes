apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec:
  containers:
  - name: nginx
    image: nginx
    ports:
    - containerPort: 80
    volumeMounts:
    - name: nginx-config
      mountPath: "/etc/nginx/conf.d"
  volumes:
    - name: nginx-config
      configMap:
      # Provide the name of the ConfigMap you want to mount.
        name: nginx-config